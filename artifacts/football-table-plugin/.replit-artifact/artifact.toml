kind = "web"
previewPath = "/"
title = "Plugin Tabela de Futebol"
version = "1.0.0"
id = "artifacts/football-table-plugin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18515

[services.development]
run = "pnpm --filter @workspace/football-table-plugin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/football-table-plugin", "run", "build" ]
publicDir = "artifacts/football-table-plugin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18515"
BASE_PATH = "/"
